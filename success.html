<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You are on the list — TaleBuzzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
:root{
  --honey:#f59e0b;--honey-dark:#d97706;--honey-pale:#fffbeb;
  --ink:#0d1117;--ink-mid:#334155;--white:#ffffff;
  --font-d:'Fraunces',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
body{font-family:var(--font-b);color:var(--ink);background:linear-gradient(150deg,var(--honey-pale),#fefcf8 50%,#f0f9ff);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.card{background:var(--white);border-radius:28px;box-shadow:0 24px 64px rgba(0,0,0,.1),0 8px 24px rgba(0,0,0,.06);padding:56px 48px;max-width:520px;width:100%;border:1px solid rgba(245,158,11,.14)}
.bee{font-size:4rem;display:block;margin-bottom:16px;animation:bounce 1s var(--ease) both}
h1{font-family:var(--font-d);font-weight:900;font-size:2rem;color:var(--ink);margin-bottom:10px}
p{color:var(--ink-mid);font-size:.97rem;line-height:1.7;max-width:380px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:7px;background:var(--honey);color:var(--white);padding:13px 28px;border-radius:11px;font-weight:700;font-size:.95rem;text-decoration:none;margin-top:28px;transition:all .2s}
.back:hover{background:var(--honey-dark);transform:translateY(-2px);box-shadow:0 8px 22px rgba(245,158,11,.38)}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-d);font-weight:900;font-size:1.1rem;color:var(--ink);margin-bottom:32px;text-decoration:none}
.logo-bee{animation:bee-bob 3.5s ease-in-out infinite;display:inline-block;font-size:1.3rem}
@keyframes bounce{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes bee-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
</style>
</head>
<body>
  <a href="/" class="logo"><span class="logo-bee">🐝</span> TaleBuzzer</a>
  <div class="card">
    <span class="bee">🐝</span>
    <h1>You are on the list!</h1>
    <p>Thank you for registering your interest in TaleBuzzer. We will be in touch very soon with your personal early-access invite — keep an eye on your inbox.</p>
    <a href="/" class="back">← Back to TaleBuzzer</a>
  </div>
</body>
</html>
